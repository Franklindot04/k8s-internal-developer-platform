helm:
  enabled: true
  chart: "base-chart"

ci:
  enabled: true
  provider: github-actions
  
  environments:
  - dev
  - staging
  - prod

documentation:
  enabled: true
  format: markdown

compatibility:
  platform_version: ">=1.0.0"
  helm_chart_version: ">=0.1.0"
  languages:
    - node
    - python
    - go

testing:
  enabled: true
  framework: bash
