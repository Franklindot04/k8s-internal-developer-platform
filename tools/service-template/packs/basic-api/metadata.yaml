helm:
  enabled: true
  chart: "base-chart"

ci:
  enabled: true
  provider: github-actions
  
  environments:
  - dev
  - staging
  - prod

documentation:
  enabled: true
  format: markdown

compatibility:
  platform_version: ">=1.0.0"
  helm_chart_version: ">=0.1.0"
  languages:
    - node
    - python
    - go

testing:
  enabled: true
  framework: bash

metadata_enrichment:
  enabled: true
  format: yaml

analytics:
  enabled: true
  events:
    - service_generated
    - template_used
    - component_selected

publishing:
  enabled: true
  registry: "local"
  version: "0.1.0"

telemetry:
  enabled: true
  events:
    - generation_started
    - generation_completed
    - generation_failed

